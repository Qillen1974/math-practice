<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Practice - Step by Step</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: #4a5568;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: #f7fafc;
            flex-wrap: wrap;
        }
        
        .mode-btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .mode-btn.active {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }
        
        .mode-btn:not(.active) {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        .practice-area {
            padding: 30px;
        }
        
        .problem-display {
            background: #f7fafc;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .problem {
            font-size: 3rem;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 20px;
        }
        
        .multiple-choice {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .choice-btn {
            padding: 20px;
            font-size: 1.5rem;
            border: 3px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
            font-weight: bold;
            color: #2d3748;
        }
        
        .choice-btn:hover {
            border-color: #667eea;
            background: #f7fafc;
            transform: scale(1.05);
        }
        
        .choice-btn.correct {
            border-color: #48bb78;
            background: #c6f6d5;
            color: #22543d;
        }
        
        .choice-btn.incorrect {
            border-color: #f56565;
            background: #fed7d7;
            color: #742a2a;
        }
        
        .steps-container {
            min-height: 200px;
        }
        
        .step {
            background: #edf2f7;
            border-radius: 10px;
            padding: 20px;
            margin: 10px 0;
            font-size: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: slideIn 0.5s forwards;
        }
        
        .step.correct {
            background: #c6f6d5;
            border-left: 5px solid #48bb78;
        }
        
        .step.incorrect {
            background: #fed7d7;
            border-left: 5px solid #f56565;
        }
        
        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .input-area {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .answer-input {
            padding: 15px 20px;
            font-size: 1.5rem;
            border: 3px solid #e2e8f0;
            border-radius: 10px;
            width: 150px;
            text-align: center;
            transition: border-color 0.3s;
        }
        
        .answer-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .submit-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .submit-btn:hover {
            transform: scale(1.05);
        }
        
        .feedback {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
        }
        
        .feedback.correct {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .feedback.incorrect {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .next-btn {
            display: block;
            margin: 20px auto;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .score {
            text-align: center;
            font-size: 1.2rem;
            color: #718096;
            padding: 10px;
        }
        
        .animation-area {
            background: #1a202c;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            min-height: 250px;
            color: white;
            font-family: 'Courier New', monospace;
        }
        
        .animation-step {
            font-size: 2rem;
            margin: 15px 0;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
            /* preserve spaces + fixed-width digits so stacked numbers really line up */
            white-space: pre;
            font-family: 'Courier New', Courier, monospace;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        .show-animation-btn {
            display: block;
            margin: 10px auto;
            padding: 12px 25px;
            font-size: 1rem;
            background: #ed8936;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .difficulty-selector {
            text-align: center;
            margin: 15px 0;
        }
        
        .difficulty-selector label {
            font-size: 1.1rem;
            margin-right: 10px;
        }
        
        .difficulty-selector select {
            padding: 8px 15px;
            font-size: 1rem;
            border-radius: 5px;
            border: 2px solid #e2e8f0;
        }
        
        .hint-text {
            text-align: center;
            color: #718096;
            font-size: 1rem;
            margin-top: 10px;
        }

        .sub-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            background: #edf2f7;
            flex-wrap: wrap;
        }

        .sub-btn {
            padding: 8px 18px;
            font-size: 0.95rem;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
            font-weight: 600;
            color: #4a5568;
        }

        .sub-btn.active {
            background: #e53e3e;
            color: white;
            border-color: #e53e3e;
        }

        .sub-btn:not(.active):hover {
            background: #f7fafc;
            border-color: #a0aec0;
        }

        .session-progress {
            padding: 12px 20px;
            background: #fffaf0;
            border-bottom: 2px solid #fbd38d;
            font-weight: 700;
            color: #744210;
            text-align: center;
            font-size: 1.05rem;
        }

        .summary-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            font-size: 1rem;
        }

        .summary-label {
            flex: 0 0 160px;
            text-align: right;
            font-weight: 600;
            color: #2d3748;
        }

        .summary-bar-track {
            flex: 1;
            background: #e2e8f0;
            border-radius: 8px;
            height: 22px;
            overflow: hidden;
        }

        .summary-bar-fill {
            height: 100%;
            border-radius: 8px;
        }

        .summary-score {
            flex: 0 0 56px;
            font-weight: 700;
            color: #4a5568;
        }

        .confetti-piece {
            position: fixed;
            top: -20px;
            width: 12px;
            height: 12px;
            pointer-events: none;
            z-index: 9999;
            animation: confetti-fall linear forwards;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(720deg); opacity: 0.7; }
        }

        .session-done-title {
            animation: pop-in 0.5s ease-out;
        }

        @keyframes pop-in {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔢 Math Practice</h1>
            <p>Learn step by step!</p>
        </div>
        
        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('word')">📝 Word Problems</button>
            <button class="mode-btn" onclick="setMode('decimal')">➕➖ Decimals</button>
            <button class="mode-btn" onclick="setMode('decimal_align')">📐 Line It Up</button>
            <button class="mode-btn" onclick="setMode('multiply')">✖️ Multiplication</button>
            <button class="mode-btn" onclick="setMode('divide')">➗ Division</button>
            <button class="mode-btn" onclick="setMode('decimal_multiply')">🔢 Decimal ×</button>
            <button class="mode-btn" onclick="setMode('order_ops')">🔢 Order of Ops</button>
            <button class="mode-btn" onclick="setMode('fractions')">🍕 Fractions</button>
            <button class="mode-btn" onclick="setMode('money')">💰 Money</button>
            <button class="mode-btn" onclick="setMode('time')">🕐 Time</button>
            <button class="mode-btn" id="dailyBtn" onclick="startDailySession()">⭐ Daily Session</button>
        </div>

        <div class="session-progress" id="sessionProgress" style="display: none;"></div>

        <div class="sub-selector" id="fractionSubSelector" style="display: none;">
            <button class="sub-btn active" onclick="setFractionSub('addition')">➕ Addition</button>
            <button class="sub-btn" onclick="setFractionSub('subtraction')">➖ Subtraction</button>
            <button class="sub-btn" onclick="setFractionSub('conversion')">🔄 Conversion</button>
            <button class="sub-btn" onclick="setFractionSub('to_decimal')">🔢 To Decimal</button>
            <button class="sub-btn" onclick="setFractionSub('simplify')">✂️ Simplify</button>
        </div>
        
        <div class="practice-area">
            <div class="difficulty-selector">
                <label>Difficulty:</label>
                <select id="difficulty" onchange="generateProblem()">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            
            <div class="problem-display">
                <div class="problem" id="problem">12.5 + 3.25 = ?</div>
                <p class="hint-text" id="hint">Enter your answer below</p>
                <div class="multiple-choice" id="multipleChoice" style="display: none;"></div>
            </div>
            
            <button class="show-animation-btn" id="watchBtn" onclick="showAnimation()">👁️ Watch How to Solve</button>
            <button class="show-animation-btn" id="newProblemBtn" onclick="generateProblem()" style="background: #48bb78; margin-left: 10px;">🔄 New Problem</button>
            
            <div class="animation-area" id="animationArea"></div>
            
            <div class="input-area" id="inputArea">
                <input type="text" class="answer-input" id="answerInput" placeholder="?">
                <button class="submit-btn" onclick="checkAnswer()">Check ✅</button>
            </div>
            
            <div class="feedback" id="feedback" style="display: none;"></div>
            
            <button class="next-btn" id="nextBtn" style="display: none;" onclick="generateProblem()">Next Problem ➡️</button>
            
            <div class="score" id="score">Score: 0 / 0</div>
        </div>
        <div style="text-align: center; padding: 10px 0 16px;">
            <a href="/parent" style="font-size: 12px; color: #a0aec0; text-decoration: none;">Parent view</a>
        </div>
    </div>

    <script>
        let currentMode = 'decimal';
        let currentProblem = {};
        let score = { correct: 0, total: 0 };
        let problemStartedAt = 0;

        // Pass 2: fire-and-forget POST so a parent dashboard can later review.
        // Never blocks Caleb's UX; failures are silent on purpose.
        function logAttempt(given, correct) {
            try {
                const payload = {
                    mode: currentMode,
                    fraction_sub: currentMode === 'fractions' ? fractionSub : null,
                    topic: (currentProblem && currentProblem.topic) ||
                        (currentMode === 'fractions' ? 'fraction_' + fractionSub : currentMode),
                    problem_text: (document.getElementById('problem').textContent || '').trim(),
                    expected: String((currentProblem && currentProblem.answer !== undefined) ? currentProblem.answer : ''),
                    given: String(given),
                    correct: !!correct,
                    ms_taken: problemStartedAt > 0 ? (Date.now() - problemStartedAt) : null,
                    daily: dailySession.active,
                };
                fetch('/api/log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    keepalive: true,
                }).catch(() => {});
            } catch (e) { /* never crash on log */ }
        }
        let animationTimeout = null;
        let fractionSub = 'addition';

        // ---------- Daily Session: mixed assessment across all topics ----------
        const SESSION_LENGTH = 20;
        const SESSION_MODES = ['word', 'decimal', 'decimal_align', 'multiply', 'divide', 'decimal_multiply', 'order_ops', 'fractions', 'money', 'time'];
        const FRACTION_SUBS = ['addition', 'subtraction', 'conversion', 'to_decimal', 'simplify'];
        const MODE_LABELS = {
            word: '📝 Word Problems', decimal: '➕➖ Decimals', decimal_align: '📐 Line It Up',
            multiply: '✖️ Multiplication', divide: '➗ Division', decimal_multiply: '🔢 Decimal ×',
            order_ops: '🔢 Order of Ops', fractions: '🍕 Fractions', money: '💰 Money', time: '🕐 Time'
        };
        let dailySession = { active: false, plan: [], index: 0, answered: false, results: [] };

        function weightedPick(weights) {
            const total = weights.reduce((a, b) => a + b, 0);
            let r = Math.random() * total;
            for (let i = 0; i < weights.length; i++) {
                r -= weights[i];
                if (r <= 0) return i;
            }
            return weights.length - 1;
        }

        function shuffleInPlace(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = getRandomInt(0, i);
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function pickFractionSub(stats) {
            // Weight fraction sub-types toward the weakest, smoothed so all stay possible
            const weights = FRACTION_SUBS.map(sub => {
                const row = stats && stats.byTopic && stats.byTopic.find(t => t.topic === 'fraction_' + sub);
                if (!row || row.n === 0) return 0.5;
                return Math.max(0.1, 1 - (row.got + 1) / (row.n + 2));
            });
            return FRACTION_SUBS[weightedPick(weights)];
        }

        function buildSessionPlan(stats) {
            // 2 of every mode = full coverage (18), + extras weighted toward weak modes
            const plan = [];
            SESSION_MODES.forEach(m => plan.push(m, m));
            const weights = SESSION_MODES.map(m => {
                const row = stats && stats.byMode && stats.byMode.find(r => r.mode === m);
                if (!row || row.n === 0) return 0.5;
                return Math.max(0.1, 1 - (row.got + 1) / (row.n + 2));
            });
            while (plan.length < SESSION_LENGTH) {
                plan.push(SESSION_MODES[weightedPick(weights)]);
            }
            shuffleInPlace(plan);
            return plan.map(m => ({ mode: m, sub: m === 'fractions' ? pickFractionSub(stats) : null }));
        }

        async function startDailySession() {
            let stats = null;
            try {
                const r = await fetch('/api/topic-stats');
                if (r.ok) stats = await r.json();
            } catch (e) { /* offline-safe: fall back to even mix */ }

            dailySession = { active: true, plan: buildSessionPlan(stats), index: 0, answered: false, results: [] };
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('dailyBtn').classList.add('active');
            document.getElementById('fractionSubSelector').style.display = 'none';
            document.getElementById('newProblemBtn').style.display = 'none';
            document.getElementById('sessionProgress').style.display = 'block';
            generateProblem();
        }

        function endDailySession() {
            dailySession.active = false;
            document.getElementById('sessionProgress').style.display = 'none';
            document.getElementById('newProblemBtn').style.display = '';
            document.getElementById('nextBtn').textContent = 'Next Problem ➡️';
        }

        function updateSessionProgress() {
            document.getElementById('sessionProgress').textContent =
                `⭐ Question ${dailySession.index + 1} of ${dailySession.plan.length}`;
        }

        function recordSessionResult(correct) {
            if (!dailySession.active || dailySession.answered) return;
            dailySession.results.push({ mode: currentMode, correct: !!correct });
            dailySession.answered = true;
            const isLast = dailySession.index >= dailySession.plan.length - 1;
            document.getElementById('nextBtn').textContent = isLast ? 'See Results 🏁' : 'Next Question ➡️';
        }

        function launchConfetti() {
            const colors = ['#667eea', '#48bb78', '#ed8936', '#e53e3e', '#ecc94b', '#4299e1', '#9f7aea'];
            for (let i = 0; i < 90; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.background = colors[getRandomInt(0, colors.length - 1)];
                piece.style.animationDuration = (2 + Math.random() * 2.5) + 's';
                piece.style.animationDelay = (Math.random() * 1.2) + 's';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                piece.style.width = piece.style.height = (8 + Math.random() * 8) + 'px';
                document.body.appendChild(piece);
                setTimeout(() => piece.remove(), 6000);
            }
        }

        function showSessionSummary() {
            const results = dailySession.results;
            const got = results.filter(r => r.correct).length;
            endDailySession();
            document.getElementById('sessionProgress').textContent = '⭐ Session Complete!';
            document.getElementById('sessionProgress').style.display = 'block';

            const problemEl = document.getElementById('problem');
            problemEl.textContent = '🏆 Daily Session Complete!';
            problemEl.classList.remove('session-done-title');
            void problemEl.offsetWidth; // restart animation on repeat sessions
            problemEl.classList.add('session-done-title');
            document.getElementById('hint').textContent = `You finished all ${results.length} questions — you got ${got} right!`;
            launchConfetti();
            playSound('fanfare');
            document.getElementById('multipleChoice').style.display = 'none';
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('watchBtn').style.display = 'none';

            const byMode = {};
            results.forEach(r => {
                if (!byMode[r.mode]) byMode[r.mode] = { n: 0, got: 0 };
                byMode[r.mode].n++;
                if (r.correct) byMode[r.mode].got++;
            });
            const rows = Object.keys(byMode)
                .sort((a, b) => (byMode[a].got / byMode[a].n) - (byMode[b].got / byMode[b].n))
                .map(m => {
                    const s = byMode[m];
                    const pct = Math.round((s.got / s.n) * 100);
                    const color = pct >= 80 ? '#48bb78' : pct >= 50 ? '#ed8936' : '#e53e3e';
                    return `<div class="summary-row">
                        <div class="summary-label">${MODE_LABELS[m] || m}</div>
                        <div class="summary-bar-track"><div class="summary-bar-fill" style="width:${pct}%;background:${color};"></div></div>
                        <div class="summary-score">${s.got}/${s.n}</div>
                    </div>`;
                }).join('');
            document.getElementById('animationArea').innerHTML =
                `<div style="padding:10px 0;">${rows}</div>
                 <div style="text-align:center;margin-top:14px;">
                     <button class="show-animation-btn" onclick="startDailySession()">⭐ Start Another Session</button>
                 </div>`;
        }
        // ---------- end Daily Session ----------

        function setMode(mode) {
            if (dailySession.active) endDailySession();
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
                const text = btn.textContent.toLowerCase();
                if ((mode === 'word' && text.includes('word')) ||
                    (mode === 'decimal' && text.includes('decimals')) ||
                    (mode === 'decimal_align' && text.includes('line it up')) ||
                    (mode === 'multiply' && text.includes('multiplication')) ||
                    (mode === 'divide' && text.includes('division')) ||
                    (mode === 'decimal_multiply' && text.includes('decimal ×')) ||
                    (mode === 'order_ops' && text.includes('order')) ||
                    (mode === 'fractions' && text.includes('fractions')) ||
                    (mode === 'money' && text.includes('money')) ||
                    (mode === 'time' && text.includes('time'))) {
                    btn.classList.add('active');
                }
            });
            document.getElementById('fractionSubSelector').style.display = mode === 'fractions' ? 'flex' : 'none';
            generateProblem();
        }

        function setFractionSub(sub) {
            fractionSub = sub;
            document.querySelectorAll('.sub-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            generateProblem();
        }
        
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        
        function generateDecimalProblem(difficulty) {
            let num1, num2, operator;
            
            if (difficulty === 'easy') {
                num1 = getRandomInt(1, 9) + getRandomInt(1, 9) / 10;
                num2 = getRandomInt(1, 9) + getRandomInt(1, 9) / 10;
                operator = Math.random() > 0.5 ? '+' : '-';
            } else if (difficulty === 'medium') {
                num1 = getRandomInt(10, 99) + getRandomInt(1, 99) / 100;
                num2 = getRandomInt(10, 99) + getRandomInt(1, 99) / 100;
                operator = Math.random() > 0.5 ? '+' : '-';
            } else {
                num1 = getRandomInt(100, 999) + getRandomInt(1, 99) / 100;
                num2 = getRandomInt(100, 999) + getRandomInt(1, 99) / 100;
                operator = Math.random() > 0.5 ? '+' : '-';
            }
            
            // Ensure positive result for subtraction
            if (operator === '-' && num1 < num2) {
                [num1, num2] = [num2, num1];
            }
            
            const answer = operator === '+' ? num1 + num2 : num1 - num2;
            
            return {
                num1: parseFloat(num1.toFixed(2)),
                num2: parseFloat(num2.toFixed(2)),
                operator: operator,
                answer: parseFloat(answer.toFixed(2)),
                type: 'decimal'
            };
        }
        
        // "Line It Up" drills — shaped like Caleb's real workbook errors, where he
        // right-aligns digits and ignores the decimal point (8 + 1.50 = 1.58 type mistakes).
        // num1/num2 returned as STRINGS so trailing zeros display (1.50, not 1.5).
        function generateDecimalAlignProblem(difficulty) {
            const r = Math.random();
            let shape;
            if (r < 0.28) shape = 'add_mixed';
            else if (r < 0.56) shape = 'sub_mixed';
            else if (r < 0.74) shape = 'x10';
            else if (r < 0.88) shape = 'x_small';
            else shape = 'facts01';

            let num1, num2, operator, answer, topic;

            if (shape === 'add_mixed') {
                // whole + decimal, mixed formats: 8 + 1.50, 3.2 + 65
                topic = 'align_add_mixed';
                operator = '+';
                let whole, dec, decStr;

        function gcd(a, b) {
            a = Math.abs(a); b = Math.abs(b);
            while (b) { [a, b] = [b, a % b]; }
            return a;
        }

        function lcm(a, b) {
            return (a * b) / gcd(a, b);
        }

        function generateFractionArithProblem(difficulty, operator) {
            let d1, d2, n1, n2;

            if (difficulty === 'easy') {
                // Same denominator

                d2 = d1;
                n1 = getRandomInt(1, d1 - 1);

                n2 = getRandomInt(1, d2 - 1);
            } else {
                // Different denominators
                d1 = getRandomInt(2, 9);
                d2 = getRandomInt(2, 9);
                while (d2 === d1) d2 = getRandomInt(2, 9);
                n1 = getRandomInt(1, d1 - 1);
                n2 = getRandomInt(1, d2 - 1);
            }

            // For subtraction, ensure result is positive
            if (operator === '-') {
                const val1 = n1 / d1;
                const val2 = n2 / d2;
                if (val1 < val2) {
                    [n1, d1, n2, d2] = [n2, d2, n1, d1];
                }
            }

            const commonDenom = lcm(d1, d2);
            const newN1 = n1 * (commonDenom / d1);
            const newN2 = n2 * (commonDenom / d2);
            const resultNum = operator === '+' ? newN1 + newN2 : newN1 - newN2;
            const resultDenom = commonDenom;

            // Simplify
            const g = gcd(Math.abs(resultNum), resultDenom);
            const simpNum = resultNum / g;
            const simpDenom = resultDenom / g;

            // Check if improper
            const isImproper = Math.abs(simpNum) >= simpDenom;
            let answer;
            if (isImproper) {
                const whole = Math.floor(simpNum / simpDenom);
                const rem = simpNum % simpDenom;
                answer = rem === 0 ? `${whole}` : `${whole} ${rem}/${simpDenom}`;
            } else {
                answer = simpDenom === 1 ? `${simpNum}` : `${simpNum}/${simpDenom}`;
            }

            return {
                n1, d1, n2, d2,
                operator,
                commonDenom,
                newN1, newN2,
                resultNum, resultDenom,
                simpNum, simpDenom,
                isImproper,
                whole: isImproper ? Math.floor(simpNum / simpDenom) : 0,
                remainder: isImproper ? simpNum % simpDenom : simpNum,
                answer,
                type: 'fractions',
                subType: operator === '+' ? 'addition' : 'subtraction'
            };

        function generateFractionToDecimalProblem(difficulty) {
            let numerator, denominator;

            if (difficulty === 'easy') {
                // Denominators that give clean decimals: 2, 4, 5, 10
                const cleanDenoms = [2, 4, 5, 10];
                denominator = cleanDenoms[getRandomInt(0, cleanDenoms.length - 1)];
                numerator = getRandomInt(1, denominator * 3);
            } else if (difficulty === 'medium') {
                // Include 8, 20, 25 for more decimal places
                const cleanDenoms = [2, 4, 5, 8, 10, 20, 25];
                denominator = cleanDenoms[getRandomInt(0, cleanDenoms.length - 1)];
                numerator = getRandomInt(1, denominator * 3);
            } else {
                // Any denominator, may produce repeating decimals
                denominator = getRandomInt(2, 12);
                numerator = getRandomInt(1, denominator * 4);
            }

            // Avoid trivial cases where numerator = denominator
            if (numerator === denominator) numerator += 1;

            const rawResult = numerator / denominator;
            // Round to 4 decimal places, trim trailing zeros
            let answer;
            // Check if it's a clean terminating decimal
            const rounded = parseFloat(rawResult.toFixed(4));
            answer = String(rounded);

            // For repeating decimals, round to 2 dp
            const check2 = parseFloat(rawResult.toFixed(2));
            const check4 = parseFloat(rawResult.toFixed(4));
            const isRepeating = Math.abs(check2 - check4) > 0.0001;

            if (isRepeating) {
                answer = rawResult.toFixed(2);
            }

            // Build long division steps
            const divSteps = [];
            let current = numerator;
            let quotientParts = [];
            const wholePart = Math.floor(current / denominator);
            let remainder = current % denominator;

            if (wholePart > 0) {
                quotientParts.push(String(wholePart));
                divSteps.push({ dividend: current, digit: wholePart, remainder: remainder, desc: `${current} ÷ ${denominator} = ${wholePart} remainder ${remainder}` });
            } else {
                quotientParts.push('0');
                divSteps.push({ dividend: current, digit: 0, remainder: remainder, desc: `${current} ÷ ${denominator} = 0 remainder ${remainder}` });
            }

            // Decimal part (up to 4 digits)
            if (remainder > 0) {
                quotientParts.push('.');
                for (let i = 0; i < 4; i++) {
                    current = remainder * 10;
                    const digit = Math.floor(current / denominator);
                    remainder = current % denominator;
                    quotientParts.push(String(digit));
                    divSteps.push({ dividend: current, digit: digit, remainder: remainder, desc: `Bring down 0: ${current} ÷ ${denominator} = ${digit} remainder ${remainder}` });
                    if (remainder === 0) break;
                }
            }

            return {
                numerator,
                denominator,
                answer: String(parseFloat(answer)),
                divSteps,
                isRepeating,
                rawResult: rounded,
                type: 'fractions',

                    const answer = pattern.start + (pattern.missing * pattern.step);

        // Generate multiple choice options (1 correct + 3 wrong)
        function generateOptions(correct, minWrong, maxWrong) {
            const options = new Set();
            options.add(correct);
            
            while (options.size < 4) {
                const offset = getRandomInt(-10, 10);
                const wrong = correct + offset;
                if (wrong > 0 && wrong !== correct && wrong <= maxWrong) {
                    options.add(wrong);
                }
            }
            
            // Convert to array and shuffle
            const arr = Array.from(options);
            for (let i = arr.length - 1; i > 0; i--) {
                const j = getRandomInt(0, i);
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            
            return arr;
        }

        function generateWordProblem() {
            const template = wordProblemTemplates[getRandomInt(0, wordProblemTemplates.length - 1)];
            return template.generate();
        }

        const SG_ITEMS = [
            ['chicken rice', 3.5, 5.5], ['kopi', 1.2, 2.0], ['iced Milo', 1.8, 2.6],
            ['a curry puff', 1.4, 2.2], ['a sandwich', 2.8, 4.6], ['fishball noodles', 3.0, 5.0],
            ['a loaf of bread', 2.0, 3.6], ['a box of eggs', 3.0, 4.8], ['an apple', 0.6, 1.2],

        ];

        function generateMoneyProblem(difficulty) {
            const fmt = v => '$' + v.toFixed(2);
            // SG cash rounds to 5 cents; easy mode uses friendlier 10-cent steps
            const step = difficulty === 'easy' ? 10 : 20;
            const priceOf = it => getRandomInt(Math.round(it[1] * step), Math.round(it[2] * step)) / step;
            const pickItems = n => shuffleInPlace(SG_ITEMS.slice()).slice(0, n)
                .map(it => ({ name: it[0], price: priceOf(it) }));
            const listOf = priced => priced.map(p => `${p.name} (${fmt(p.price)})`).join(' and ');
            const sumOf = priced => Math.round(priced.reduce((s, p) => s + p.price, 0) * 100) / 100;

            const sub = ['money_total', 'money_change', 'money_compare'][getRandomInt(0, 2)];

            if (sub === 'money_total') {
                const priced = pickItems(difficulty === 'hard' ? 3 : 2);
                const total = sumOf(priced);
                return {
                    type: 'money', topic: 'money_total',
                    question: `At the hawker centre you buy ${listOf(priced)}. How much do you pay in total?`,
                    items: priced, answer: total, answerText: fmt(total)
                };
            }

            if (sub === 'money_change') {
                const priced = pickItems(difficulty === 'hard' ? 2 : 1);
                const cost = sumOf(priced);
                const note = difficulty === 'easy' ? 10
                    : (cost >= 10 ? 50 : (Math.random() > 0.5 ? 10 : 50));
                const change = Math.round((note - cost) * 100) / 100;
                return {
                    type: 'money', topic: 'money_change',
                    question: `You buy ${listOf(priced)} and pay with a $${note} note. How much change do you get?`,
                    items: priced, cost, note, answer: change, answerText: fmt(change)
                };
            }

            // money_compare — swapped-digit prices drill decimal place value
            const dollars = getRandomInt(1, 9);
            const a = getRandomInt(0, 9);
            let b;
            do { b = getRandomInt(0, 9); } while (b === a);
            const p1 = dollars + a / 10 + b / 100;
            const p2 = dollars + b / 10 + a / 100;
            const cheaper = Math.min(p1, p2);
            const item = SG_ITEMS[getRandomInt(0, SG_ITEMS.length - 1)][0];
            return {
                type: 'money', topic: 'money_compare',
                question: `Two stalls sell ${item}. One charges ${fmt(p1)}, the other charges ${fmt(p2)}. Type the cheaper price.`,
                p1, p2, answer: cheaper, answerText: fmt(cheaper)
            };
        }

        function showMoneyAnimation() {
            const fmt = v => v.toFixed(2);
            const steps = [];
            const p = currentProblem;

            const stack = (amounts, op, result) => {
                const strs = amounts.map(fmt);
                const w = Math.max(...strs.map(s => s.length), fmt(result).length);
                strs.forEach((s, i) => steps.push(`${i === strs.length - 1 ? ' ' + op : '  '} $${s.padStart(w)}`));
                steps.push(`    ${'─'.repeat(w + 1)}`);
                steps.push(`    $${fmt(result).padStart(w)}`);
            };

            if (p.topic === 'money_total') {
                steps.push(`📝 Add the prices`);
                steps.push(``);
                stack(p.items.map(i => i.price), '+', p.answer);
                steps.push(``);
                steps.push(`💡 Money always has 2 decimal places,`);
                steps.push(`   so the points line up by themselves!`);
                steps.push(``);
                steps.push(`🎯 Total = ${p.answerText}`);
            } else if (p.topic === 'money_change') {
                if (p.items.length > 1) {
                    steps.push(`📝 Step 1: Add up what you bought`);
                    steps.push(``);
                    stack(p.items.map(i => i.price), '+', p.cost);
                    steps.push(``);
                    steps.push(`📝 Step 2: Change = money given − cost`);
                } else {
                    steps.push(`📝 Change = money given − cost`);
                }
                steps.push(``);
                stack([p.note, p.cost], '−', p.answer);
                steps.push(``);
                steps.push(`🎯 Your change is ${p.answerText}`);
            } else {
                const t1 = Math.floor(p.p1 * 10) % 10;
                const t2 = Math.floor(p.p2 * 10) % 10;
                steps.push(`📝 $${fmt(p.p1)} vs $${fmt(p.p2)}`);
                steps.push(``);
                steps.push(`✨ Compare digit by digit from the LEFT`);
                steps.push(`   Dollars: ${Math.floor(p.p1)} = ${Math.floor(p.p2)} → same, keep going`);
                steps.push(`   Next place (10¢): ${t1} vs ${t2}`);
                steps.push(`   ${Math.min(t1, t2)} is smaller — stop there!`);
                steps.push(``);
                steps.push(`⚠️ The first different place decides it,`);
                steps.push(`   no matter what comes after.`);
                steps.push(``);
                steps.push(`🎯 ${p.answerText} is cheaper`);
            }

            displayAnimationSteps(steps);
        }

        const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

        function fmtClock(mins) {
            const h = Math.floor(mins / 60) % 24, m = mins % 60;
            const ap = h >= 12 ? 'pm' : 'am';
            let h12 = h % 12;
            if (h12 === 0) h12 = 12;
            return `${h12}:${String(m).padStart(2, '0')} ${ap}`;
        }

        function fmtDur(mins) {
            const h = Math.floor(mins / 60), m = mins % 60;
            if (h === 0) return `${m} minutes`;
            if (m === 0) return `${h} hour${h > 1 ? 's' : ''}`;
            return `${h} hour${h > 1 ? 's' : ''} ${m} minutes`;
        }

        function buildOptions(answer, candidates) {
            const opts = [answer];
            for (const c of candidates) {
                if (opts.length >= 4) break;
                if (c && !opts.includes(c)) opts.push(c);
            }
            return shuffleInPlace(opts);
        }

        function generateTimeProblem(difficulty) {
            const sub = ['time_end', 'time_elapsed', 'time_calendar'][getRandomInt(0, 2)];

            if (sub === 'time_end') {
                // start + duration → end time
                const start = getRandomInt(84, 240) * 5; // 7:00 am – 8:00 pm, 5-min steps
                const dur = difficulty === 'easy' ? getRandomInt(2, 11) * 5
                    : difficulty === 'medium' ? getRandomInt(4, 18) * 5
                    : getRandomInt(7, 30) * 5;
                const end = start + dur;
                const templates = [
                    `The MRT train leaves the station at ${fmtClock(start)}. The ride takes ${fmtDur(dur)}. What time does it arrive?`,
                    `Maths class starts at ${fmtClock(start)} and lasts ${fmtDur(dur)}. What time does it end?`,
                    `A movie starts at ${fmtClock(start)} and runs for ${fmtDur(dur)}. What time does it finish?`,
                    `The bus leaves the interchange at ${fmtClock(start)}. The trip takes ${fmtDur(dur)}. What time does it arrive?`
                ];
                return {
                    type: 'time', topic: 'time_end', start, dur,
                    question: templates[getRandomInt(0, templates.length - 1)],
                    answer: fmtClock(end),
                    options: buildOptions(fmtClock(end), shuffleInPlace(
                        [end - 10, end + 10, end + 60, end - 60, end + 15, end - 15, end + 5].filter(t => t > 0)
                    ).map(fmtClock))
                };
            }

            if (sub === 'time_elapsed') {
                // opening hours / how long (30-min steps keep it WPN-realistic)
                const openM = getRandomInt(12, 22) * 30;            // 6:00 – 11:00 am
                const closeM = getRandomInt(26, 44) * 30;           // 1:00 – 10:00 pm
                const elapsed = closeM - openM;
                const templates = [
                    `The library opens at ${fmtClock(openM)} and closes at ${fmtClock(closeM)}. How long is it open?`,
                    `The hawker stall opens at ${fmtClock(openM)} and closes at ${fmtClock(closeM)}. How long is it open each day?`,
                    `The swimming pool opens at ${fmtClock(openM)} and closes at ${fmtClock(closeM)}. How long is it open?`
                ];
                return {
                    type: 'time', topic: 'time_elapsed', openM, closeM,
                    question: templates[getRandomInt(0, templates.length - 1)],
                    answer: fmtDur(elapsed),
                    options: buildOptions(fmtDur(elapsed), shuffleInPlace(
                        [elapsed + 60, elapsed - 60, elapsed + 30, elapsed - 30, elapsed + 120].filter(t => t > 0)
                    ).map(fmtDur))
                };
            }

            // time_calendar — day-of-week counting
            const todayIdx = getRandomInt(0, 6);
            const n = difficulty === 'easy' ? getRandomInt(1, 6)
                : difficulty === 'medium' ? getRandomInt(2, 9)
                : getRandomInt(8, 13);
            const answerIdx = (todayIdx + n) % 7;
            const templates = [
                `Today is ${DAYS[todayIdx]}. The school outing is in ${n} days. What day will it be?`,
                `Today is ${DAYS[todayIdx]}. The school holiday starts in ${n} days. What day will that be?`,
                `Today is ${DAYS[todayIdx]}. Grandma is visiting in ${n} days. What day will she come?`
            ];
            return {
                type: 'time', topic: 'time_calendar', todayIdx, n,
                question: templates[getRandomInt(0, templates.length - 1)],
                answer: DAYS[answerIdx],
                options: buildOptions(DAYS[answerIdx], shuffleInPlace(
                    [1, 6, 2, 5, 3].map(off => DAYS[(answerIdx + off) % 7])
                ))
            };
        }

        function showTimeAnimation() {
            const p = currentProblem;
            const steps = [];

            if (p.topic === 'time_end') {
                steps.push(`📝 Start at ${fmtClock(p.start)}, add ${fmtDur(p.dur)}`);
                steps.push(``);
                let cur = p.start, remaining = p.dur;
                const hours = Math.floor(remaining / 60);
                if (hours > 0) {
                    steps.push(`✨ Add the hours first:`);
                    steps.push(`   ${fmtClock(cur)} + ${hours} hour${hours > 1 ? 's' : ''} → ${fmtClock(cur + hours * 60)}`);
                    cur += hours * 60;
                    remaining -= hours * 60;
                    if (remaining > 0) steps.push(``);
                }
                if (remaining > 0) {
                    const toHour = 60 - (cur % 60);
                    if (cur % 60 !== 0 && remaining >= toHour) {
                        steps.push(`✨ Count on to the next hour:`);
                        steps.push(`   ${fmtClock(cur)} + ${toHour} min → ${fmtClock(cur + toHour)}`);
                        if (remaining - toHour > 0) {
                            steps.push(`   then + ${remaining - toHour} min → ${fmtClock(cur + remaining)}`);
                        }
                    } else {
                        steps.push(`✨ Add the minutes:`);
                        steps.push(`   ${fmtClock(cur)} + ${remaining} min → ${fmtClock(cur + remaining)}`);
                    }
                }
                steps.push(``);
                steps.push(`🎯 ${p.answer}`);
            } else if (p.topic === 'time_elapsed') {
                steps.push(`📝 From ${fmtClock(p.openM)} to ${fmtClock(p.closeM)}`);
                steps.push(``);
                let cur = p.openM;
                if (cur % 60 !== 0) {
                    const toHour = 60 - (cur % 60);
                    steps.push(`✨ First, to the next full hour:`);
                    steps.push(`   ${fmtClock(cur)} → ${fmtClock(cur + toHour)} is ${toHour} min`);
                    cur += toHour;
                }
                steps.push(`✨ Then count the hours:`);
                steps.push(`   ${fmtClock(cur)} → ${fmtClock(p.closeM)} is ${fmtDur(p.closeM - cur)}`);
                if (p.openM % 60 !== 0) {
                    steps.push(``);
                    steps.push(`✨ Add them together:`);
                    steps.push(`   ${fmtDur(p.closeM - cur)} + ${60 - (p.openM % 60)} min = ${p.answer}`);
                }
                steps.push(``);
                steps.push(`🎯 Open for ${p.answer}`);
            } else {
                steps.push(`📝 Today is ${DAYS[p.todayIdx]}, count ${p.n} days ahead`);
                steps.push(``);
                if (p.n >= 7) {
                    steps.push(`✨ 7 days later is the SAME day → ${DAYS[p.todayIdx]}`);
                    steps.push(`   ${p.n} − 7 = ${p.n - 7} more day${p.n - 7 === 1 ? '' : 's'} to count`);
                }
                const extra = p.n % 7;
                if (extra > 0) {
                    const walk = [];
                    for (let i = 1; i <= extra; i++) walk.push(DAYS[(p.todayIdx + i) % 7]);
                    steps.push(`✨ Count: ${walk.join(' → ')}`);
                }
                steps.push(``);
                steps.push(`🎯 ${p.answer}`);
            }

            displayAnimationSteps(steps);
        }

        function generateProblem() {
            if (dailySession.active) {
                if (dailySession.answered) {
                    dailySession.index++;
                    dailySession.answered = false;
                }
                if (dailySession.index >= dailySession.plan.length) {
                    showSessionSummary();
                    return;
                }
                const q = dailySession.plan[dailySession.index];
                currentMode = q.mode;
                if (q.sub) fractionSub = q.sub;
                updateSessionProgress();
            }
            document.getElementById('watchBtn').style.display = '';

            const difficulty = document.getElementById('difficulty').value;
            problemStartedAt = Date.now();

            if (currentMode === 'word') {
                currentProblem = generateWordProblem();
            } else if (currentMode === 'decimal') {
                currentProblem = generateDecimalProblem(difficulty);
            } else if (currentMode === 'decimal_align') {
                currentProblem = generateDecimalAlignProblem(difficulty);
            } else if (currentMode === 'multiply') {
                currentProblem = generateMultiplyProblem(difficulty);
            } else if (currentMode === 'divide') {
                currentProblem = generateDivideProblem(difficulty);
            } else if (currentMode === 'decimal_multiply') {
                currentProblem = generateDecimalMultiplyProblem(difficulty);
            } else if (currentMode === 'order_ops') {
                currentProblem = generateOrderOpsProblem(difficulty);
            } else if (currentMode === 'fractions') {
                if (fractionSub === 'conversion') {
                    currentProblem = generateFractionProblem(difficulty);
                } else if (fractionSub === 'to_decimal') {
                    currentProblem = generateFractionToDecimalProblem(difficulty);
                } else if (fractionSub === 'simplify') {
                    currentProblem = generateFractionSimplifyProblem(difficulty);
                } else {
                    currentProblem = generateFractionArithProblem(difficulty, fractionSub === 'addition' ? '+' : '-');
                }
            } else if (currentMode === 'money') {
                currentProblem = generateMoneyProblem(difficulty);
            } else if (currentMode === 'time') {
                currentProblem = generateTimeProblem(difficulty);
            }

            if (currentMode === 'word' || currentMode === 'time') {
                // Display problem with multiple choice
                document.getElementById('problem').textContent = currentProblem.question;
                document.getElementById('hint').textContent = 'Select the correct answer:';
                document.getElementById('multipleChoice').style.display = 'grid';
                document.getElementById('inputArea').style.display = 'none';
                
                // Generate multiple choice buttons
                const mcDiv = document.getElementById('multipleChoice');
                mcDiv.innerHTML = '';
                const letters = ['A', 'B', 'C', 'D'];
                currentProblem.options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.textContent = `${letters[idx]}. ${opt}`;
                    btn.onclick = () => checkWordAnswer(opt, btn);
                    mcDiv.appendChild(btn);
                });
            } else if (currentMode === 'order_ops') {
                document.getElementById('problem').textContent = `${currentProblem.expression} = ?`;
                document.getElementById('hint').textContent = 'Enter your answer below';
                document.getElementById('multipleChoice').style.display = 'none';
                document.getElementById('inputArea').style.display = 'block';
                document.getElementById('answerInput').value = '';
            } else if (currentMode === 'fractions') {
                if (currentProblem.subType === 'conversion') {
                    document.getElementById('problem').textContent = `Convert ${currentProblem.numerator}/${currentProblem.denominator} to a proper fraction`;
                    document.getElementById('hint').textContent = 'Enter as: whole remainder/denominator (e.g. 2 1/3)';
                } else if (currentProblem.subType === 'simplify') {
                    document.getElementById('problem').textContent = `Simplify ${currentProblem.numerator}/${currentProblem.denominator}`;
                    document.getElementById('hint').textContent = 'Reduce to simplest form (e.g. 3/4)';
                } else if (currentProblem.subType === 'to_decimal') {
                    document.getElementById('problem').textContent = `${currentProblem.numerator}/${currentProblem.denominator} = ?`;
                    document.getElementById('hint').textContent = `Divide ${currentProblem.numerator} by ${currentProblem.denominator}. Enter as decimal (e.g. 0.75)` + (currentProblem.isRepeating ? ' — round to 2 decimal places' : '');
                } else {
                    document.getElementById('problem').textContent = `${currentProblem.n1}/${currentProblem.d1} ${currentProblem.operator} ${currentProblem.n2}/${currentProblem.d2} = ?`;
                    if (currentProblem.isImproper) {
                        document.getElementById('hint').textContent = 'Simplify and convert to proper fraction (e.g. 2 1/3)';
                    } else {
                        document.getElementById('hint').textContent = 'Simplify your answer (e.g. 3/4)';
                    }
                }
                document.getElementById('multipleChoice').style.display = 'none';
                document.getElementById('inputArea').style.display = 'block';
                document.getElementById('answerInput').value = '';
            } else if (currentMode === 'money') {

                document.getElementById('hint').textContent = '💰 Answer in dollars, like 6.70';
                document.getElementById('multipleChoice').style.display = 'none';
                document.getElementById('inputArea').style.display = 'block';
                document.getElementById('answerInput').value = '';
            } else {
                document.getElementById('problem').textContent =
                    `${currentProblem.num1} ${currentProblem.operator} ${currentProblem.num2} = ?`;
                document.getElementById('hint').textContent = currentProblem.type === 'decimal_align'
                    ? '📐 Line up the decimal points, not the ends!'
                    : 'Enter your answer below';
                document.getElementById('multipleChoice').style.display = 'none';
                document.getElementById('inputArea').style.display = 'block';
                document.getElementById('answerInput').value = '';
            }
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('animationArea').innerHTML = '';
            
            if (animationTimeout) clearTimeout(animationTimeout);
        }
        
        function checkWordAnswer(selected, btn) {
            // Disable all buttons
            const buttons = document.querySelectorAll('.choice-btn');
            buttons.forEach(b => b.disabled = true);
            
            score.total++;
            
            if (selected === currentProblem.answer) {
                // Correct
                btn.classList.add('correct');

            } else if (topic === 'align_x_small') {

                steps.push(`📝 ${num1} × ${num2}`);

                steps.push(``);
                steps.push(`📝 Step 2: Put the point back`);
                steps.push(`   ${num1} has ${dp} decimal place${dp > 1 ? 's' : ''},`);
                steps.push(`   so count ${dp} from the right:`);
                steps.push(`   ${big} → ${fmtAnswer(answer)}`);
                steps.push(``);
                steps.push(`🎯 ${num1} × ${num2} = ${fmtAnswer(answer)}`);
            } else {
                // add_mixed / sub_mixed — the vertical alignment lesson
                const dp = Math.max(dpOf(num1), dpOf(num2), 1);
                const s1 = v1.toFixed(dp);

                const w = Math.max(s1.length, s2.length, (operator === '+' ? answer : answer).toFixed(dp).length);

        function showMultiplyAnimation() {
            const area = document.getElementById('animationArea');
            const { num1, num2, answer } = currentProblem;
            
            let steps = [];
            const n1Str = num1.toString();
            const n2Str = num2.toString();

            steps.push(``);
            
            // Explain each digit multiplication
            steps.push(`📝 Step 1: Multiply ${n1Str} by each digit of ${n2Str}`);
            steps.push(``);
            
            // For each digit in n2
            let partials = [];
            for (let i = n2Str.length - 1; i >= 0; i--) {
                const digit = parseInt(n2Str[i]);
                const placeValue = Math.pow(10, n2Str.length - 1 - i);
                const product = num1 * digit;
                
                let explanation = `${num1} × ${digit}`;
                if (placeValue > 1) {
                    explanation += ` (${digit} is in ${placeValue}s place)`;
                }
                explanation += ` = ${product}`;
                
                steps.push(`   ${explanation}`);
                
                // Add zeros for place value
                let paddedProduct = product.toString() + '0'.repeat(n2Str.length - 1 - i);
                partials.push({ product: product, padded: paddedProduct, place: placeValue });
            }
            
            steps.push(``);
            steps.push(`📝 Step 2: Add zeros for place value`);
            partials.forEach(p => {
                if (p.place > 1) {
                    steps.push(`   ${p.product} → add ${n2Str.length - 1} zero(s) → ${p.padded}`);
                } else {
                    steps.push(`   ${p.product} → no zero needed`);
                }
            });
            
            steps.push(``);
            steps.push(`📝 Step 3: Write and add`);
            
            // Write aligned partials
            let maxLen = 0;
            const alignedPartials = partials.map((p, i) => {
                const s = ' '.repeat(i) + p.padded;
                if (s.length > maxLen) maxLen = s.length;
                return s;
            });
            
            alignedPartials.forEach(p => {
                steps.push(`   ${p}`);
            });
            
            steps.push(`   ${'─'.repeat(maxLen)}`);
            
            // Calculate sum
            let sum = 0;
            partials.forEach(p => sum += parseInt(p.padded));
            steps.push(`   ${answer}`);
            
            steps.push(``);
            steps.push(`🎯 ${num1} × ${n2Str} = ${answer}`);
            
            displayAnimationSteps(steps);
        }

        function showFractionArithAnimation() {
            const p = currentProblem;
            const opWord = p.operator === '+' ? 'Add' : 'Subtract';
            let steps = [];

            steps.push(`📝 ${p.n1}/${p.d1} ${p.operator} ${p.n2}/${p.d2}`);
            steps.push(``);

            if (p.d1 === p.d2) {
                steps.push(`📝 Step 1: Denominators are the same (${p.d1})`);
                steps.push(`   ${opWord} the numerators: ${p.n1} ${p.operator} ${p.n2} = ${p.resultNum}`);
                steps.push(``);
                steps.push(`📝 Step 2: Keep the denominator`);
                steps.push(`   Result: ${p.resultNum}/${p.resultDenom}`);
            } else {
                steps.push(`📝 Step 1: Find the common denominator`);
                steps.push(`   LCD of ${p.d1} and ${p.d2} = ${p.commonDenom}`);
                steps.push(``);
                steps.push(`📝 Step 2: Convert both fractions`);
                steps.push(`   ${p.n1}/${p.d1} = ${p.newN1}/${p.commonDenom}  (multiply top and bottom by ${p.commonDenom / p.d1})`);
                steps.push(`   ${p.n2}/${p.d2} = ${p.newN2}/${p.commonDenom}  (multiply top and bottom by ${p.commonDenom / p.d2})`);
                steps.push(``);
                steps.push(`📝 Step 3: ${opWord} the numerators`);
                steps.push(`   ${p.newN1} ${p.operator} ${p.newN2} = ${p.resultNum}`);
                steps.push(`   Result: ${p.resultNum}/${p.resultDenom}`);
            }

            // Simplify step
            const g = gcd(Math.abs(p.resultNum), p.resultDenom);
            if (g > 1) {
                steps.push(``);
                steps.push(`📝 Step ${p.d1 === p.d2 ? 3 : 4}: Simplify`);
                steps.push(`   ${p.resultNum}/${p.resultDenom} ÷ ${g}/${g} = ${p.simpNum}/${p.simpDenom}`);
            }

            // Convert if improper
            if (p.isImproper) {
                steps.push(``);
                steps.push(`📝 Step ${p.d1 === p.d2 ? (g > 1 ? 4 : 3) : (g > 1 ? 5 : 4)}: Convert to proper fraction`);
                steps.push(`   ${p.simpNum} ÷ ${p.simpDenom} = ${p.whole} remainder ${p.remainder}`);
                if (p.remainder === 0) {
                    steps.push(`   Answer: ${p.whole}`);
                } else {
                    steps.push(`   Answer: ${p.whole} ${p.remainder}/${p.simpDenom}`);
                }
            }

            steps.push(``);
            steps.push(`🎯 ${p.n1}/${p.d1} ${p.operator} ${p.n2}/${p.d2} = ${p.answer}`);

            displayAnimationSteps(steps);
        }

        function checkAnswer() {
            const rawAnswer = document.getElementById('answerInput').value.trim();
            const feedback = document.getElementById('feedback');

            if (!rawAnswer) {
                feedback.textContent = 'Please enter an answer! 📝';
                feedback.className = 'feedback incorrect';
                feedback.style.display = 'block';
                return;
            }

            score.total++;

            let correct;
            if (currentProblem.type === 'fractions') {
                // Try "whole remainder/denominator" format e.g. "2 1/3"
                const mixedMatch = rawAnswer.match(/^(\d+)\s+(\d+)\/(\d+)$/);
                // Try "numerator/denominator" format e.g. "3/4"
                const fracMatch = rawAnswer.match(/^(\d+)\/(\d+)$/);
                // Try whole number e.g. "3"
                const wholeMatch = rawAnswer.match(/^(\d+)$/);

                if (currentProblem.subType === 'simplify') {
                    const fracMatch = rawAnswer.match(/^(\d+)\/(\d+)$/);
                    if (fracMatch) {
                        const n = parseInt(fracMatch[1]);
                        const d = parseInt(fracMatch[2]);
                        correct = (n === currentProblem.simpNum && d === currentProblem.simpDenom);
                    } else {
                        correct = false;
                    }
                } else if (currentProblem.subType === 'to_decimal') {
                    const userVal = parseFloat(rawAnswer);
                    if (isNaN(userVal)) {
                        correct = false;
                    } else if (currentProblem.isRepeating) {
                        correct = Math.abs(userVal - currentProblem.rawResult) < 0.01;
                    } else {
                        correct = Math.abs(userVal - currentProblem.rawResult) < 0.0001;
                    }
                } else if (currentProblem.subType === 'conversion') {
                    if (mixedMatch) {
                        const w = parseInt(mixedMatch[1]);
                        const r = parseInt(mixedMatch[2]);
                        const d = parseInt(mixedMatch[3]);
                        // Accept any equivalent fraction part (e.g. both "1 2/4" and "1 1/2" for 6/4)
                        correct = (w === currentProblem.whole && d > 0 && r < d &&
                                   r * currentProblem.denominator === currentProblem.remainder * d);
                    } else {
                        correct = false;
                    }
                } else {
                    // Addition/subtraction: accept simplified fraction, mixed number, or whole number
                    if (mixedMatch) {
                        const w = parseInt(mixedMatch[1]);
                        const r = parseInt(mixedMatch[2]);
                        const d = parseInt(mixedMatch[3]);
                        // Convert user answer to improper: (w*d + r) / d, then simplify
                        const userNum = w * d + r;
                        const userDenom = d;
                        const g1 = gcd(userNum, userDenom);
                        correct = (userNum / g1 === currentProblem.simpNum && userDenom / g1 === currentProblem.simpDenom) ||
                                  (w === currentProblem.whole && r === currentProblem.remainder && d === currentProblem.simpDenom);
                    } else if (fracMatch) {
                        const n = parseInt(fracMatch[1]);
                        const d = parseInt(fracMatch[2]);
                        const g1 = gcd(n, d);
                        correct = (n / g1 === currentProblem.simpNum && d / g1 === currentProblem.simpDenom);
                    } else if (wholeMatch) {
                        const w = parseInt(wholeMatch[1]);
                        correct = (currentProblem.simpDenom === 1 && w === currentProblem.simpNum) ||
                                  (currentProblem.remainder === 0 && w === currentProblem.whole);
                    } else {
                        correct = false;
                    }

                    // If answer is improper fraction but user gave unsimplified proper form, reject
                    if (correct && currentProblem.isImproper && fracMatch && !wholeMatch) {
                        const n = parseInt(fracMatch[1]);
                        const d = parseInt(fracMatch[2]);
                        if (n >= d) correct = false; // Must convert to proper
                    }
                }
            } else {
                // Accept "$6.70" as well as "6.70" in money mode
                const userAnswer = parseFloat(rawAnswer.replace(/^\$/, ''));
                if (isNaN(userAnswer)) {
                    feedback.textContent = 'Please enter a number! 📝';
                    feedback.className = 'feedback incorrect';
                    feedback.style.display = 'block';
                    score.total--;
                    return;
                }
                // Check with 2 decimal places for decimals, exact match for others
                correct = (currentProblem.type === 'decimal' || currentProblem.type === 'decimal_multiply' || currentProblem.type === 'decimal_align' || currentProblem.type === 'money')
                    ? Math.abs(userAnswer - currentProblem.answer) < 0.01
                    : userAnswer === currentProblem.answer;
            }
            
            if (correct) {
                score.correct++;
                feedback.textContent = '🎉 Correct! Great job!';
                feedback.className = 'feedback correct';
                playSound('correct');
            } else {
                feedback.innerHTML = `❌ Not quite.<br>The answer is ${currentProblem.answerText || currentProblem.answer}`;
                feedback.className = 'feedback incorrect';
                playSound('incorrect');
            }
            logAttempt(rawAnswer, correct);
            recordSessionResult(correct);

            feedback.style.display = 'block';
            document.getElementById('nextBtn').style.display = 'block';
            updateScore();
        }
        
        function playSound(type) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                if (type === 'fanfare') {
                    // C5 → E5 → G5 → C6 rising arpeggio with a held final note
                    oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
                    oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.15);
                    oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.3);
                    oscillator.frequency.setValueAtTime(1046.5, audioContext.currentTime + 0.45);
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime + 0.45);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1.1);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 1.1);
                } else if (type === 'correct') {
                    oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
                    oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // E5
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                } else {
                    oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                    oscillator.frequency.setValueAtTime(150, audioContext.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.4);
                }
            } catch (e) {
                console.log('Audio not supported');
            }
        }
        
        // Handle Enter key
        document.getElementById('answerInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
        
        // Initialize
        generateProblem();
    </script>
