<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Practice - Step by Step</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: #4a5568;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: #f7fafc;
            flex-wrap: wrap;
        }
        
        .mode-btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .mode-btn.active {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }
        
        .mode-btn:not(.active) {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        .practice-area {
            padding: 30px;
        }
        
        .problem-display {
            background: #f7fafc;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .problem {
            font-size: 3rem;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 20px;
        }
        
        .multiple-choice {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .choice-btn {
            padding: 20px;
            font-size: 1.5rem;
            border: 3px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
            font-weight: bold;
            color: #2d3748;
        }
        
        .choice-btn:hover {
            border-color: #667eea;
            background: #f7fafc;
            transform: scale(1.05);
        }
        
        .choice-btn.correct {
            border-color: #48bb78;
            background: #c6f6d5;
            color: #22543d;
        }
        
        .choice-btn.incorrect {
            border-color: #f56565;
            background: #fed7d7;
            color: #742a2a;
        }
        
        .steps-container {
            min-height: 200px;
        }
        
        .step {
            background: #edf2f7;
            border-radius: 10px;
            padding: 20px;
            margin: 10px 0;
            font-size: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: slideIn 0.5s forwards;
        }
        
        .step.correct {
            background: #c6f6d5;
            border-left: 5px solid #48bb78;
        }
        
        .step.incorrect {
            background: #fed7d7;
            border-left: 5px solid #f56565;
        }
        
        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .input-area {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .answer-input {
            padding: 15px 20px;
            font-size: 1.5rem;
            border: 3px solid #e2e8f0;
            border-radius: 10px;
            width: 150px;
            text-align: center;
            transition: border-color 0.3s;
        }
        
        .answer-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .submit-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .submit-btn:hover {
            transform: scale(1.05);
        }
        
        .feedback {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
        }
        
        .feedback.correct {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .feedback.incorrect {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .next-btn {
            display: block;
            margin: 20px auto;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .score {
            text-align: center;
            font-size: 1.2rem;
            color: #718096;
            padding: 10px;
        }
        
        .animation-area {
            background: #1a202c;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            min-height: 250px;
            color: white;
            font-family: 'Courier New', monospace;
        }
        
        .animation-step {
            font-size: 2rem;
            margin: 15px 0;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        .show-animation-btn {
            display: block;
            margin: 10px auto;
            padding: 12px 25px;
            font-size: 1rem;
            background: #ed8936;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .difficulty-selector {
            text-align: center;
            margin: 15px 0;
        }
        
        .difficulty-selector label {
            font-size: 1.1rem;
            margin-right: 10px;
        }
        
        .difficulty-selector select {
            padding: 8px 15px;
            font-size: 1rem;
            border-radius: 5px;
            border: 2px solid #e2e8f0;
        }
        
        .hint-text {
            text-align: center;
            color: #718096;
            font-size: 1rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔢 Math Practice</h1>
            <p>Learn step by step!</p>
        </div>
        
        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('word')">📝 Word Problems</button>
            <button class="mode-btn" onclick="setMode('decimal')">➕➖ Decimals</button>
            <button class="mode-btn" onclick="setMode('multiply')">✖️ Multiplication</button>
            <button class="mode-btn" onclick="setMode('divide')">➗ Division</button>
            <button class="mode-btn" onclick="setMode('decimal_multiply')">🔢 Decimal ×</button>
            <button class="mode-btn" onclick="setMode('order_ops')">🔢 Order of Ops</button>
        </div>
        
        <div class="practice-area">
            <div class="difficulty-selector">
                <label>Difficulty:</label>
                <select id="difficulty" onchange="generateProblem()">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            
            <div class="problem-display">
                <div class="problem" id="problem">12.5 + 3.25 = ?</div>
                <p class="hint-text" id="hint">Enter your answer below</p>
                <div class="multiple-choice" id="multipleChoice" style="display: none;"></div>
            </div>
            
            <button class="show-animation-btn" onclick="showAnimation()">👁️ Watch How to Solve</button>
            <button class="show-animation-btn" onclick="generateProblem()" style="background: #48bb78; margin-left: 10px;">🔄 New Problem</button>
            
            <div class="animation-area" id="animationArea"></div>
            
            <div class="input-area" id="inputArea">
                <input type="text" class="answer-input" id="answerInput" placeholder="?">
                <button class="submit-btn" onclick="checkAnswer()">Check ✅</button>
            </div>
            
            <div class="feedback" id="feedback" style="display: none;"></div>
            
            <button class="next-btn" id="nextBtn" style="display: none;" onclick="generateProblem()">Next Problem ➡️</button>
            
            <div class="score" id="score">Score: 0 / 0</div>
        </div>
    </div>

    <script>
        let currentMode = 'decimal';
        let currentProblem = {};
        let score = { correct: 0, total: 0 };
        let animationTimeout = null;
        
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
                const text = btn.textContent.toLowerCase();
                if ((mode === 'word' && text.includes('word')) ||
                    (mode === 'decimal' && text.includes('decimals')) ||
                    (mode === 'multiply' && text.includes('multiplication')) ||
                    (mode === 'divide' && text.includes('division')) ||
                    (mode === 'decimal_multiply' && text.includes('decimal ×')) ||
                    (mode === 'order_ops' && text.includes('order'))) {
                    btn.classList.add('active');
                }
            });
            generateProblem();
        }
        
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        
        function generateDecimalProblem(difficulty) {
            let num1, num2, operator;
            
            if (difficulty === 'easy') {
                num1 = getRandomInt(1, 9) + getRandomInt(1, 9) / 10;
                num2 = getRandomInt(1, 9) + getRandomInt(1, 9) / 10;
                operator = Math.random() > 0.5 ? '+' : '-';
            } else if (difficulty === 'medium') {
                num1 = getRandomInt(10, 99) + getRandomInt(1, 99) / 100;
                num2 = getRandomInt(10, 99) + getRandomInt(1, 99) / 100;
                operator = Math.random() > 0.5 ? '+' : '-';
            } else {
                num1 = getRandomInt(100, 999) + getRandomInt(1, 99) / 100;
                num2 = getRandomInt(100, 999) + getRandomInt(1, 99) / 100;
                operator = Math.random() > 0.5 ? '+' : '-';
            }
            
            // Ensure positive result for subtraction
            if (operator === '-' && num1 < num2) {
                [num1, num2] = [num2, num1];
            }
            
            const answer = operator === '+' ? num1 + num2 : num1 - num2;
            
            return {
                num1: parseFloat(num1.toFixed(2)),
                num2: parseFloat(num2.toFixed(2)),
                operator: operator,
                answer: parseFloat(answer.toFixed(2)),
                type: 'decimal'
            };
        }
        
        function generateMultiplyProblem(difficulty) {
            let num1, num2;
            
            if (difficulty === 'easy') {
                num1 = getRandomInt(11, 20);
                num2 = getRandomInt(2, 9);
            } else if (difficulty === 'medium') {
                num1 = getRandomInt(11, 30);
                num2 = getRandomInt(11, 30);
            } else {
                num1 = getRandomInt(31, 99);
                num2 = getRandomInt(31, 99);
            }
            
            return {
                num1: num1,
                num2: num2,
                operator: '×',
                answer: num1 * num2,
                type: 'multiply'
            };
        }
        
        function generateDivideProblem(difficulty) {
            let num1, num2, answer;
            
            // Generate clean division problems (no remainders for simplicity)
            if (difficulty === 'easy') {
                // Simple: divisor 2-9, quotient 2-10
                num2 = getRandomInt(2, 9);
                answer = getRandomInt(2, 10);
                num1 = num2 * answer;
            } else if (difficulty === 'medium') {
                // Medium: divisor 2-12, quotient 11-30
                num2 = getRandomInt(2, 12);
                answer = getRandomInt(11, 30);
                num1 = num2 * answer;
            } else {
                // Hard: divisor 11-25, quotient 20-50
                num2 = getRandomInt(11, 25);
                answer = getRandomInt(20, 50);
                num1 = num2 * answer;
            }
            
            return {
                num1: num1,
                num2: num2,
                operator: '÷',
                answer: answer,
                type: 'divide'
            };
        }
        
        function generateDecimalMultiplyProblem(difficulty) {
            let num1, num2, decimalPlaces;

            if (difficulty === 'easy') {
                decimalPlaces = 1;
                num1 = getRandomInt(11, 99) / 10;  // 1.1–9.9
                num2 = getRandomInt(2, 9);
            } else if (difficulty === 'medium') {
                decimalPlaces = 2;
                num1 = getRandomInt(101, 999) / 100;  // 1.01–9.99
                num2 = getRandomInt(2, 9);
            } else {
                decimalPlaces = 3;
                num1 = getRandomInt(1, 9999) / 1000;  // 0.001–9.999
                num2 = getRandomInt(2, 9);
            }

            num1 = parseFloat(num1.toFixed(decimalPlaces));
            const answer = parseFloat((num1 * num2).toFixed(decimalPlaces));

            return {
                num1: num1,
                num2: num2,
                operator: '×',
                answer: answer,
                type: 'decimal_multiply',
                decimalPlaces: decimalPlaces
            };
        }

        function generateOrderOpsProblem(difficulty) {
            // Helper to pick a random element from an array
            const pick = arr => arr[Math.floor(Math.random() * arr.length)];

            if (difficulty === 'easy') {
                // 3 operands, 2 operators (one +/-, one ×/÷), no parentheses
                const a = getRandomInt(2, 9);
                const b = getRandomInt(2, 9);
                const c = getRandomInt(1, 9);
                const mulOrDiv = pick(['×', '÷']);
                const addOrSub = pick(['+', '-']);

                let expr, answer, steps;

                if (Math.random() < 0.5) {
                    // Pattern: a +/- b ×/÷ c
                    let bVal = b, cVal = c;
                    if (mulOrDiv === '÷') {
                        cVal = getRandomInt(2, 5);
                        bVal = cVal * getRandomInt(2, 5);
                    }
                    const mulResult = mulOrDiv === '×' ? bVal * cVal : bVal / cVal;
                    const finalAnswer = addOrSub === '+' ? a + mulResult : a - mulResult;
                    // Ensure positive result
                    if (finalAnswer < 0) {
                        return generateOrderOpsProblem(difficulty);
                    }
                    expr = `${a} ${addOrSub} ${bVal} ${mulOrDiv} ${cVal}`;
                    answer = finalAnswer;
                    steps = [
                        { text: `Start: ${expr}`, expr: expr },
                        { text: `First, ${mulOrDiv === '×' ? 'multiply' : 'divide'}: ${bVal} ${mulOrDiv} ${cVal} = ${mulResult}`, expr: `${a} ${addOrSub} ${mulResult}` },
                        { text: `Then, ${addOrSub === '+' ? 'add' : 'subtract'}: ${a} ${addOrSub} ${mulResult} = ${answer}`, expr: `${answer}` }
                    ];
                } else {
                    // Pattern: a ×/÷ b +/- c
                    let aVal = a, bVal = b;
                    if (mulOrDiv === '÷') {
                        bVal = getRandomInt(2, 5);
                        aVal = bVal * getRandomInt(2, 5);
                    }
                    const mulResult = mulOrDiv === '×' ? aVal * bVal : aVal / bVal;
                    const finalAnswer = addOrSub === '+' ? mulResult + c : mulResult - c;
                    if (finalAnswer < 0) {
                        return generateOrderOpsProblem(difficulty);
                    }
                    expr = `${aVal} ${mulOrDiv} ${bVal} ${addOrSub} ${c}`;
                    answer = finalAnswer;
                    steps = [
                        { text: `Start: ${expr}`, expr: expr },
                        { text: `First, ${mulOrDiv === '×' ? 'multiply' : 'divide'}: ${aVal} ${mulOrDiv} ${bVal} = ${mulResult}`, expr: `${mulResult} ${addOrSub} ${c}` },
                        { text: `Then, ${addOrSub === '+' ? 'add' : 'subtract'}: ${mulResult} ${addOrSub} ${c} = ${answer}`, expr: `${answer}` }
                    ];
                }

                return { expression: expr, answer: answer, type: 'order_ops', steps: steps };

            } else if (difficulty === 'medium') {
                // 3-4 operands with parentheses
                const pattern = pick(['paren_mul', 'mul_paren', 'paren_add']);

                if (pattern === 'paren_mul') {
                    // (a + b) × c
                    const a = getRandomInt(1, 9);
                    const b = getRandomInt(1, 9);
                    const c = getRandomInt(2, 6);
                    const addOrSub = pick(['+', '-']);
                    const aVal = addOrSub === '-' ? Math.max(a, b) : a;
                    const bVal = addOrSub === '-' ? Math.min(a, b) : b;
                    const parenResult = addOrSub === '+' ? aVal + bVal : aVal - bVal;
                    const answer = parenResult * c;
                    const expr = `(${aVal} ${addOrSub} ${bVal}) × ${c}`;
                    return {
                        expression: expr, answer: answer, type: 'order_ops',
                        steps: [
                            { text: `Start: ${expr}`, expr: expr },
                            { text: `Parentheses first: ${aVal} ${addOrSub} ${bVal} = ${parenResult}`, expr: `${parenResult} × ${c}` },
                            { text: `Then multiply: ${parenResult} × ${c} = ${answer}`, expr: `${answer}` }
                        ]
                    };
                } else if (pattern === 'mul_paren') {
                    // c × (a + b) - d
                    const a = getRandomInt(1, 9);
                    const b = getRandomInt(1, 9);
                    const c = getRandomInt(2, 5);
                    const d = getRandomInt(1, 9);
                    const parenResult = a + b;
                    const mulResult = c * parenResult;
                    const answer = mulResult - d;
                    if (answer < 0) return generateOrderOpsProblem(difficulty);
                    const expr = `${c} × (${a} + ${b}) - ${d}`;
                    return {
                        expression: expr, answer: answer, type: 'order_ops',
                        steps: [
                            { text: `Start: ${expr}`, expr: expr },
                            { text: `Parentheses first: ${a} + ${b} = ${parenResult}`, expr: `${c} × ${parenResult} - ${d}` },
                            { text: `Then multiply: ${c} × ${parenResult} = ${mulResult}`, expr: `${mulResult} - ${d}` },
                            { text: `Then subtract: ${mulResult} - ${d} = ${answer}`, expr: `${answer}` }
                        ]
                    };
                } else {
                    // a + (b × c) - d
                    const a = getRandomInt(10, 20);
                    const b = getRandomInt(2, 5);
                    const c = getRandomInt(2, 5);
                    const d = getRandomInt(1, 9);
                    const mulResult = b * c;
                    const answer = a + mulResult - d;
                    if (answer < 0) return generateOrderOpsProblem(difficulty);
                    const expr = `${a} + (${b} × ${c}) - ${d}`;
                    return {
                        expression: expr, answer: answer, type: 'order_ops',
                        steps: [
                            { text: `Start: ${expr}`, expr: expr },
                            { text: `Parentheses first: ${b} × ${c} = ${mulResult}`, expr: `${a} + ${mulResult} - ${d}` },
                            { text: `Left to right, add: ${a} + ${mulResult} = ${a + mulResult}`, expr: `${a + mulResult} - ${d}` },
                            { text: `Then subtract: ${a + mulResult} - ${d} = ${answer}`, expr: `${answer}` }
                        ]
                    };
                }

            } else {
                // Hard: 4-5 operands, mixed operators, may include ÷ and parentheses
                const pattern = pick(['mixed_no_paren', 'mixed_paren', 'double_mul_div']);

                if (pattern === 'mixed_no_paren') {
                    // a + b × c - d ÷ e
                    const b = getRandomInt(2, 6);
                    const c = getRandomInt(2, 6);
                    const e = getRandomInt(2, 5);
                    const d = e * getRandomInt(2, 5);
                    const a = getRandomInt(10, 30);
                    const mulResult = b * c;
                    const divResult = d / e;
                    const answer = a + mulResult - divResult;
                    if (answer < 0 || answer !== Math.floor(answer)) return generateOrderOpsProblem(difficulty);
                    const expr = `${a} + ${b} × ${c} - ${d} ÷ ${e}`;
                    return {
                        expression: expr, answer: answer, type: 'order_ops',
                        steps: [
                            { text: `Start: ${expr}`, expr: expr },
                            { text: `Multiply first: ${b} × ${c} = ${mulResult}`, expr: `${a} + ${mulResult} - ${d} ÷ ${e}` },
                            { text: `Divide: ${d} ÷ ${e} = ${divResult}`, expr: `${a} + ${mulResult} - ${divResult}` },
                            { text: `Add: ${a} + ${mulResult} = ${a + mulResult}`, expr: `${a + mulResult} - ${divResult}` },
                            { text: `Subtract: ${a + mulResult} - ${divResult} = ${answer}`, expr: `${answer}` }
                        ]
                    };
                } else if (pattern === 'mixed_paren') {
                    // (a + b) × c - d ÷ e
                    const a = getRandomInt(2, 8);
                    const b = getRandomInt(2, 8);
                    const c = getRandomInt(2, 5);
                    const e = getRandomInt(2, 4);
                    const d = e * getRandomInt(2, 5);
                    const parenResult = a + b;
                    const mulResult = parenResult * c;
                    const divResult = d / e;
                    const answer = mulResult - divResult;
                    if (answer < 0 || answer !== Math.floor(answer)) return generateOrderOpsProblem(difficulty);
                    const expr = `(${a} + ${b}) × ${c} - ${d} ÷ ${e}`;
                    return {
                        expression: expr, answer: answer, type: 'order_ops',
                        steps: [
                            { text: `Start: ${expr}`, expr: expr },
                            { text: `Parentheses first: ${a} + ${b} = ${parenResult}`, expr: `${parenResult} × ${c} - ${d} ÷ ${e}` },
                            { text: `Multiply: ${parenResult} × ${c} = ${mulResult}`, expr: `${mulResult} - ${d} ÷ ${e}` },
                            { text: `Divide: ${d} ÷ ${e} = ${divResult}`, expr: `${mulResult} - ${divResult}` },
                            { text: `Subtract: ${mulResult} - ${divResult} = ${answer}`, expr: `${answer}` }
                        ]
                    };
                } else {
                    // a × b + c × d - e
                    const a = getRandomInt(2, 6);
                    const b = getRandomInt(2, 6);
                    const c = getRandomInt(2, 6);
                    const d = getRandomInt(2, 6);
                    const e = getRandomInt(1, 9);
                    const mul1 = a * b;
                    const mul2 = c * d;
                    const answer = mul1 + mul2 - e;
                    if (answer < 0) return generateOrderOpsProblem(difficulty);
                    const expr = `${a} × ${b} + ${c} × ${d} - ${e}`;
                    return {
                        expression: expr, answer: answer, type: 'order_ops',
                        steps: [
                            { text: `Start: ${expr}`, expr: expr },
                            { text: `Multiply left: ${a} × ${b} = ${mul1}`, expr: `${mul1} + ${c} × ${d} - ${e}` },
                            { text: `Multiply right: ${c} × ${d} = ${mul2}`, expr: `${mul1} + ${mul2} - ${e}` },
                            { text: `Add: ${mul1} + ${mul2} = ${mul1 + mul2}`, expr: `${mul1 + mul2} - ${e}` },
                            { text: `Subtract: ${mul1 + mul2} - ${e} = ${answer}`, expr: `${answer}` }
                        ]
                    };
                }
            }
        }

        // Word problem templates based on numeracy assessment style
        const wordProblemTemplates = [
            // Packing/remaining problems
            {
                template: "{name} needs to pack {total} boxes. He has packed {done} boxes. How many more boxes does he need to pack?",
                generate: () => {
                    const names = ['Ali', 'John', 'Sam', 'Tom', 'Ben', 'Tim'];
                    const total = getRandomInt(15, 30);
                    const done = getRandomInt(5, total - 5);
                    return {
                        question: wordProblemTemplates[0].template.replace('{name}', names[getRandomInt(0, names.length - 1)]).replace('{total}', total).replace('{done}', done),
                        answer: total - done,
                        options: generateOptions(total - done, 1, 10)
                    };
                }
            },
            // Multiplication word problems
            {
                template: "Mrs {name} puts {perBox} pencils into each box. There are {boxes} boxes. How many pencils are there in total?",
                generate: () => {
                    const names = ['Lee', 'Tan', 'Lim', 'Wong', 'Ng', 'Chen'];
                    const perBox = getRandomInt(8, 15);
                    const boxes = getRandomInt(5, 12);
                    return {
                        question: wordProblemTemplates[1].template.replace('{name}', names[getRandomInt(0, names.length - 1)]).replace('{perBox}', perBox).replace('{boxes}', boxes),
                        answer: perBox * boxes,
                        options: generateOptions(perBox * boxes, perBox, perBox * boxes + 20)
                    };
                }
            },
            // Wheels/objects per item
            {
                template: "A {vehicle} has {wheels} wheels. How many wheels do {count} {vehicle}s have?",
                generate: () => {
                    const vehicles = [
                        { name: 'car', wheels: 4 },
                        { name: 'bicycle', wheels: 2 },
                        { name: 'tricycle', wheels: 3 },
                        { name: 'bus', wheels: 6 }
                    ];
                    const vehicle = vehicles[getRandomInt(0, vehicles.length - 1)];
                    const count = getRandomInt(3, 10);
                    return {
                        question: wordProblemTemplates[2].template.replace('{vehicle}', vehicle.name).replace('{wheels}', vehicle.wheels).replace('{count}', count),
                        answer: vehicle.wheels * count,
                        options: generateOptions(vehicle.wheels * count, vehicle.wheels, vehicle.wheels * count + 15)
                    };
                }
            },
            // Simple addition
            {
                template: "There are {num1} students in Class A and {num2} students in Class B. How many students are there altogether?",
                generate: () => {
                    const num1 = getRandomInt(20, 40);
                    const num2 = getRandomInt(15, 35);
                    return {
                        question: wordProblemTemplates[3].template.replace('{num1}', num1).replace('{num2}', num2),
                        answer: num1 + num2,
                        options: generateOptions(num1 + num2, 10, num1 + num2 + 20)
                    };
                }
            },
            // Simple subtraction
            {
                template: "A shop has {start} apples. They sell {sold} apples. How many apples are left?",
                generate: () => {
                    const start = getRandomInt(50, 100);
                    const sold = getRandomInt(20, start - 10);
                    return {
                        question: wordProblemTemplates[4].template.replace('{start}', start).replace('{sold}', sold),
                        answer: start - sold,
                        options: generateOptions(start - sold, 5, start)
                    };
                }
            },
            // Division (equal groups)
            {
                template: "{total} cookies are shared equally among {people} children. How many cookies does each child get?",
                generate: () => {
                    const people = getRandomInt(4, 9);
                    const perChild = getRandomInt(5, 12);
                    const total = people * perChild;
                    return {
                        question: wordProblemTemplates[5].template.replace('{total}', total).replace('{people}', people),
                        answer: perChild,
                        options: generateOptions(perChild, 2, perChild + 8)
                    };
                }
            },
            // Number sequences
            {
                template: "What is the missing number? {seq}",
                generate: () => {
                    const patterns = [
                        { start: getRandomInt(20, 40), step: 1, missing: 1 },
                        { start: getRandomInt(10, 30) * 5, step: 5, missing: getRandomInt(1, 4) },
                        { start: getRandomInt(2, 10) * 10, step: 10, missing: getRandomInt(1, 4) }
                    ];
                    const pattern = patterns[getRandomInt(0, patterns.length - 1)];
                    const seq = [];
                    for (let i = 0; i < 6; i++) {
                        if (i === pattern.missing) {
                            seq.push('__');
                        } else {
                            seq.push(pattern.start + (i * pattern.step));
                        }
                    }
                    const answer = pattern.start + (pattern.missing * pattern.step);
                    return {
                        question: wordProblemTemplates[6].template.replace('{seq}', seq.join(', ')),
                        answer: answer,
                        options: generateOptions(answer, pattern.step, answer + 15)
                    };
                }
            },
            // Address/recognition
            {
                template: "{name} lives at {num} {street}. Which number does {he} live at?",
                generate: () => {
                    const names = ['Sarah', 'Ali', 'John', 'Mei', 'Tim'];
                    const streets = ['Orchard Road', 'Main Street', 'Park Lane', 'River Road', 'Hill Street'];
                    const num = getRandomInt(5, 50);
                    const name = names[getRandomInt(0, names.length - 1)];
                    const street = streets[getRandomInt(0, streets.length - 1)];
                    const he = name.charAt(name.length - 1) === 'h' ? 'she' : 'he';
                    return {
                        question: wordProblemTemplates[7].template.replace('{name}', name).replace('{num}', num).replace('{street}', street).replace('{he}', he),
                        answer: num,
                        options: generateOptions(num, 1, num + 10)
                    };
                }
            }
        ];

        // Generate multiple choice options (1 correct + 3 wrong)
        function generateOptions(correct, minWrong, maxWrong) {
            const options = new Set();
            options.add(correct);
            
            while (options.size < 4) {
                const offset = getRandomInt(-10, 10);
                const wrong = correct + offset;
                if (wrong > 0 && wrong !== correct && wrong <= maxWrong) {
                    options.add(wrong);
                }
            }
            
            // Convert to array and shuffle
            const arr = Array.from(options);
            for (let i = arr.length - 1; i > 0; i--) {
                const j = getRandomInt(0, i);
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            
            return arr;
        }

        function generateWordProblem() {
            const template = wordProblemTemplates[getRandomInt(0, wordProblemTemplates.length - 1)];
            return template.generate();
        }

        function generateProblem() {
            const difficulty = document.getElementById('difficulty').value;
            
            if (currentMode === 'word') {
                currentProblem = generateWordProblem();
            } else if (currentMode === 'decimal') {
                currentProblem = generateDecimalProblem(difficulty);
            } else if (currentMode === 'multiply') {
                currentProblem = generateMultiplyProblem(difficulty);
            } else if (currentMode === 'divide') {
                currentProblem = generateDivideProblem(difficulty);
            } else if (currentMode === 'decimal_multiply') {
                currentProblem = generateDecimalMultiplyProblem(difficulty);
            } else if (currentMode === 'order_ops') {
                currentProblem = generateOrderOpsProblem(difficulty);
            }

            if (currentMode === 'word') {
                // Display word problem with multiple choice
                document.getElementById('problem').textContent = currentProblem.question;
                document.getElementById('hint').textContent = 'Select the correct answer:';
                document.getElementById('multipleChoice').style.display = 'grid';
                document.getElementById('inputArea').style.display = 'none';
                
                // Generate multiple choice buttons
                const mcDiv = document.getElementById('multipleChoice');
                mcDiv.innerHTML = '';
                const letters = ['A', 'B', 'C', 'D'];
                currentProblem.options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.textContent = `${letters[idx]}. ${opt}`;
                    btn.onclick = () => checkWordAnswer(opt, btn);
                    mcDiv.appendChild(btn);
                });
            } else if (currentMode === 'order_ops') {
                document.getElementById('problem').textContent = `${currentProblem.expression} = ?`;
                document.getElementById('hint').textContent = 'Enter your answer below';
                document.getElementById('multipleChoice').style.display = 'none';
                document.getElementById('inputArea').style.display = 'block';
                document.getElementById('answerInput').value = '';
            } else {
                document.getElementById('problem').textContent =
                    `${currentProblem.num1} ${currentProblem.operator} ${currentProblem.num2} = ?`;
                document.getElementById('hint').textContent = 'Enter your answer below';
                document.getElementById('multipleChoice').style.display = 'none';
                document.getElementById('inputArea').style.display = 'block';
                document.getElementById('answerInput').value = '';
            }
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('animationArea').innerHTML = '';
            
            if (animationTimeout) clearTimeout(animationTimeout);
        }
        
        function checkWordAnswer(selected, btn) {
            // Disable all buttons
            const buttons = document.querySelectorAll('.choice-btn');
            buttons.forEach(b => b.disabled = true);
            
            score.total++;
            
            if (selected === currentProblem.answer) {
                // Correct
                btn.classList.add('correct');
                score.correct++;
                document.getElementById('feedback').textContent = '✓ Correct! Well done!';
                document.getElementById('feedback').style.color = '#22543d';
                document.getElementById('feedback').style.display = 'block';
            } else {
                // Incorrect
                btn.classList.add('incorrect');
                document.getElementById('feedback').textContent = `✗ Not quite. The correct answer is ${currentProblem.answer}`;
                document.getElementById('feedback').style.color = '#742a2a';
                document.getElementById('feedback').style.display = 'block';
                
                // Highlight correct answer
                buttons.forEach(b => {
                    if (b.textContent.includes(currentProblem.answer)) {
                        b.classList.add('correct');
                    }
                });
            }
            
            updateScore();
            document.getElementById('nextBtn').style.display = 'block';
        }
        
        function showAnimation() {
            const area = document.getElementById('animationArea');
            area.innerHTML = '';
            
            if (currentProblem.type === 'decimal') {
                showDecimalAnimation();
            } else if (currentProblem.type === 'multiply') {
                showMultiplyAnimation();
            } else if (currentProblem.type === 'divide') {
                showDivideAnimation();
            } else if (currentProblem.type === 'decimal_multiply') {
                showDecimalMultiplyAnimation();
            } else if (currentProblem.type === 'order_ops') {
                showOrderOpsAnimation();
            }
        }
        
        function showDecimalAnimation() {
            const area = document.getElementById('animationArea');
            const { num1, num2, operator, answer } = currentProblem;
            
            // Get raw values
            const n1Val = num1;
            const n2Val = num2;
            
            // Format for display - preserve actual decimal places
            const fmt = (n) => {
                // Convert to string and pad to 2 decimal places
                return n.toFixed(2);
            };
            
            const n1Str = fmt(n1Val);
            const n2Str = fmt(n2Val);
            const width = 8;
            
            let steps = [];
            
            if (operator === '+') {
                // Addition
                steps.push(`📝 ${n1Str} + ${n2Str}`);
                steps.push(``);
                steps.push(`📝 Step 1: Add decimals`);
                steps.push(`   ${n1Str}`);
                steps.push(` + ${n2Str}`);
                steps.push(`   ${'─'.repeat(width)}`);
                
                const decSum = Math.round((n1Val % 1 + n2Val % 1) * 100);
                const carry = Math.floor(decSum / 100);
                const newDec = decSum % 100;
                
                if (carry > 0) {
                    steps.push(`   ${Math.round((n1Val%1)*100)} + ${Math.round((n2Val%1)*100)} = ${decSum}`);
                    steps.push(`   Carry ${carry} to ones!`);
                    steps.push(``);
                    steps.push(`📝 Step 2: Add ones + carry`);
                    const onesSum = Math.floor(n1Val) + Math.floor(n2Val) + carry;
                    steps.push(`   ${Math.floor(n1Val)} + ${Math.floor(n2Val)} + ${carry} = ${onesSum}`);
                }
                
                steps.push(``);
                steps.push(`🎯 ${n1Str} + ${n2Str} = ${fmt(answer)}`);
                
            } else {
                // Subtraction
                steps.push(`📝 ${n1Str} - ${n2Str}`);
                steps.push(``);
                
                // Get decimal parts
                const d1 = Math.round((n1Val % 1) * 100);
                const d2 = Math.round((n2Val % 1) * 100);
                const i1 = Math.floor(n1Val);
                const i2 = Math.floor(n2Val);
                
                const needBorrow = d1 < d2;
                
                if (needBorrow) {
                    const newDec = d1 + 100 - d2;
                    const newInt = i1 - 1;
                    
                    steps.push(`📝 Step 1: ${d1} - ${d2}?`);
                    steps.push(`   Not enough! Borrow 1 from ones 👉`);
                    steps.push(``);
                    steps.push(`📝 Step 2: After borrow`);
                    steps.push(`   ${i1}.${String(d1).padStart(2,'0')}`);
                    steps.push(` - ${i2}.${String(d2).padStart(2,'0')}`);
                    steps.push(`   ${'─'.repeat(width)}`);
                    steps.push(`   ${newInt}.${String(newDec).padStart(2,'0')} ←`);
                    steps.push(``);
                    steps.push(`📝 Step 3: Subtract`);
                    steps.push(`   ${d1} + 100 - ${d2} = ${newDec}`);
                    steps.push(`   ${i1} - 1 - ${i2} = ${newInt - i2}`);
                    steps.push(``);
                } else {
                    steps.push(`📝 Step 1: Subtract decimals`);
                    steps.push(`   ${n1Str}`);
                    steps.push(` - ${n2Str}`);
                    steps.push(`   ${'─'.repeat(width)}`);
                    steps.push(`   ${d1} - ${d2} = ${d1 - d2}`);
                    steps.push(``);
                    steps.push(`📝 Step 2: Subtract ones`);
                    steps.push(`   ${i1} - ${i2} = ${i1 - i2}`);
                    steps.push(``);
                }
                
                steps.push(`🎯 ${n1Str} - ${n2Str} = ${fmt(answer)}`);
            }
            
            displayAnimationSteps(steps);
        }
        
        function showMultiplyAnimation() {
            const area = document.getElementById('animationArea');
            const { num1, num2, answer } = currentProblem;
            
            let steps = [];
            const n1Str = num1.toString();
            const n2Str = num2.toString();
            
            steps.push(`📝 ${num1} × ${n2Str}`);
            steps.push(``);
            
            // Explain each digit multiplication
            steps.push(`📝 Step 1: Multiply ${n1Str} by each digit of ${n2Str}`);
            steps.push(``);
            
            // For each digit in n2
            let partials = [];
            for (let i = n2Str.length - 1; i >= 0; i--) {
                const digit = parseInt(n2Str[i]);
                const placeValue = Math.pow(10, n2Str.length - 1 - i);
                const product = num1 * digit;
                
                let explanation = `${num1} × ${digit}`;
                if (placeValue > 1) {
                    explanation += ` (${digit} is in ${placeValue}s place)`;
                }
                explanation += ` = ${product}`;
                
                steps.push(`   ${explanation}`);
                
                // Add zeros for place value
                let paddedProduct = product.toString() + '0'.repeat(n2Str.length - 1 - i);
                partials.push({ product: product, padded: paddedProduct, place: placeValue });
            }
            
            steps.push(``);
            steps.push(`📝 Step 2: Add zeros for place value`);
            partials.forEach(p => {
                if (p.place > 1) {
                    steps.push(`   ${p.product} → add ${n2Str.length - 1} zero(s) → ${p.padded}`);
                } else {
                    steps.push(`   ${p.product} → no zero needed`);
                }
            });
            
            steps.push(``);
            steps.push(`📝 Step 3: Write and add`);
            
            // Write aligned partials
            let maxLen = 0;
            const alignedPartials = partials.map((p, i) => {
                const s = ' '.repeat(i) + p.padded;
                if (s.length > maxLen) maxLen = s.length;
                return s;
            });
            
            alignedPartials.forEach(p => {
                steps.push(`   ${p}`);
            });
            
            steps.push(`   ${'─'.repeat(maxLen)}`);
            
            // Calculate sum
            let sum = 0;
            partials.forEach(p => sum += parseInt(p.padded));
            steps.push(`   ${answer}`);
            
            steps.push(``);
            steps.push(`🎯 ${num1} × ${n2Str} = ${answer}`);
            
            displayAnimationSteps(steps);
        }
        
        function showDivideAnimation() {
            const area = document.getElementById('animationArea');
            const { num1: dividend, num2: divisor, answer } = currentProblem;
            
            let steps = [];
            
            steps.push(`📝 ${dividend} ÷ ${divisor}`);
            steps.push(``);
            steps.push(`📝 Long Division`);
            steps.push(``);
            steps.push(`   ┌────${answer}`);
            steps.push(`   │ ${dividend}`);
            steps.push(`   │`);
            
            // Calculate partial quotients
            let remainder = dividend;
            let working = '';
            let current = 0;
            let tempDiv = divisor;
            
            const dividendStr = dividend.toString();
            
            steps.push(`📝 Step 1: Divide ${dividend} by ${divisor}`);
            steps.push(``);
            
            // Simple approach: show the multiplication check
            steps.push(`📝 Step 2: Multiply ${divisor} × ${answer}`);
            steps.push(`   ${divisor} × ${answer} = ${divisor * answer}`);
            steps.push(``);
            steps.push(`📝 Step 3: Subtract`);
            steps.push(`   ${dividend} - ${divisor * answer} = ${dividend - divisor * answer}`);
            steps.push(``);
            
            if (dividend - divisor * answer === 0) {
                steps.push(`   ✅ Remainder is 0 - Perfect division!`);
            } else {
                steps.push(`   📝 Remainder: ${dividend - divisor * answer}`);
            }
            
            steps.push(``);
            steps.push(`🎯 ${dividend} ÷ ${divisor} = ${answer}`);
            
            displayAnimationSteps(steps);
        }
        
        function showDecimalMultiplyAnimation() {
            const { num1, num2, answer, decimalPlaces } = currentProblem;

            const num1Str = num1.toFixed(decimalPlaces);
            const wholeNum = Math.round(num1 * Math.pow(10, decimalPlaces));
            const wholeProduct = wholeNum * num2;

            let steps = [];

            steps.push(`📝 ${num1Str} × ${num2}`);
            steps.push(``);
            steps.push(`📝 Step 1: Ignore the decimal, multiply as whole numbers`);
            steps.push(`   ${num1Str} → ${wholeNum}`);
            steps.push(``);
            steps.push(`📝 Step 2: Multiply whole numbers`);
            steps.push(`   ${wholeNum} × ${num2} = ${wholeProduct}`);
            steps.push(``);
            steps.push(`📝 Step 3: Count decimal places in original`);
            steps.push(`   ${num1Str} has ${decimalPlaces} decimal place${decimalPlaces > 1 ? 's' : ''}`);
            steps.push(``);
            steps.push(`📝 Step 4: Place the decimal point`);
            steps.push(`   ${wholeProduct} → ${answer}`);
            steps.push(`   (move decimal ${decimalPlaces} place${decimalPlaces > 1 ? 's' : ''} from the right)`);
            steps.push(``);
            steps.push(`🎯 ${num1Str} × ${num2} = ${answer}`);

            displayAnimationSteps(steps);
        }

        function showOrderOpsAnimation() {
            const { expression, answer, steps: solveSteps } = currentProblem;

            let steps = [];
            steps.push(`📝 Solve: ${expression}`);
            steps.push(`📝 Remember PEMDAS: Parentheses, Exponents, Multiply/Divide, Add/Subtract`);
            steps.push(``);

            solveSteps.forEach((s, i) => {
                if (i === 0) {
                    steps.push(`📝 ${s.text}`);
                } else if (i === solveSteps.length - 1) {
                    steps.push(`📝 ${s.text}`);
                    steps.push(``);
                    steps.push(`🎯 Answer: ${answer}`);
                } else {
                    steps.push(`📝 Step ${i}: ${s.text}`);
                    steps.push(`   → ${s.expr}`);
                }
            });

            displayAnimationSteps(steps);
        }

        function displayAnimationSteps(steps) {
            const area = document.getElementById('animationArea');
            area.innerHTML = '';
            
            steps.forEach((step, index) => {
                const div = document.createElement('div');
                div.className = 'animation-step';
                div.textContent = step;
                div.style.animationDelay = `${index * 0.8}s`;
                area.appendChild(div);
            });
        }
        
        function checkAnswer() {
            const userAnswer = parseFloat(document.getElementById('answerInput').value);
            const feedback = document.getElementById('feedback');
            
            if (isNaN(userAnswer)) {
                feedback.textContent = 'Please enter a number! 📝';
                feedback.className = 'feedback incorrect';
                feedback.style.display = 'block';
                return;
            }
            
            score.total++;
            
            // Check with 2 decimal places for decimals, exact match for others
            const correct = (currentProblem.type === 'decimal' || currentProblem.type === 'decimal_multiply')
                ? Math.abs(userAnswer - currentProblem.answer) < 0.01
                : userAnswer === currentProblem.answer;
            
            if (correct) {
                score.correct++;
                feedback.textContent = '🎉 Correct! Great job!';
                feedback.className = 'feedback correct';
                playSound('correct');
            } else {
                feedback.innerHTML = `❌ Not quite.<br>The answer is ${currentProblem.answer}`;
                feedback.className = 'feedback incorrect';
                playSound('incorrect');
            }
            
            feedback.style.display = 'block';
            document.getElementById('nextBtn').style.display = 'block';
            document.getElementById('score').textContent = 
                `Score: ${score.correct} / ${score.total}`;
        }
        
        function playSound(type) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                if (type === 'correct') {
                    oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
                    oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // E5
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                } else {
                    oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                    oscillator.frequency.setValueAtTime(150, audioContext.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.4);
                }
            } catch (e) {
                console.log('Audio not supported');
            }
        }
        
        // Handle Enter key
        document.getElementById('answerInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
        
        // Initialize
        generateProblem();
    </script>
